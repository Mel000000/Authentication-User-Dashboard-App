name: Tests Automation

# Normally I would instead use a webhook as the trigger so the test runs on the latest deployment,
# but I will instead use the Render API to fetch the current status of deployment to save costs.
on:
  workflow_dispatch:
  push:
    branches: [ testing ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm' # Automatically handles ~/.npm caching safely

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Installs OS system dependencies every run, but skips downloading the 
      # actual browser binaries if they were found in our cache storage step.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps


      - name: Warm up Render instance
        run: |
          curl -s https://audaf-testing.onrender.com/health || true
          sleep 5

      - name: Run tests
        env:
          CI: true
          MAILOSAUR_API_KEY: ${{ secrets.MAILOSAUR_API_KEY }}
        run: npx playwright test
      
      - name: Format test results
        run: |
          if [ -f results.json ]; then
            # Parse metrics from Playwright JSON output
            PASSED=$(jq '.stats.expected' results.json)
            FAILED=$(jq '.stats.unexpected' results.json)
            SKIPPED=$(jq '.stats.skipped' results.json)

            echo "### 📊 Test Suite Execution Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| ⏭️ Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Generate a native Markdown Pie Chart using Mermaid
            echo "#### Visual Breakdown" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`mermaid" >> $GITHUB_STEP_SUMMARY
            echo "pie title Test Suite Distribution" >> $GITHUB_STEP_SUMMARY
            echo "    \"Passed\" : $PASSED" >> $GITHUB_STEP_SUMMARY
            echo "    \"Failed\" : $FAILED" >> $GITHUB_STEP_SUMMARY
            echo "    \"Skipped\" : $SKIPPED" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # Extract failed tests lists along with their target browser project
            if [ "$FAILED" -gt 0 ]; then
              echo "### 🚨 Failed Tests Details" >> $GITHUB_STEP_SUMMARY
              echo "The following tests failed during this run:" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY

              # Deep-scans the JSON file, filters for unexpected results, and formats with the project name
              jq -r '.. | .specs? // empty | .[] | select(.tests[].results[].status != "expected") | .file as $file | .title as $title | .tests[] | select(.results[].status != "expected") | "* ❌ **" + $title + "** — 🌐 \`🏼" + .projectName + "\` *(in \`" + $file + "\`)*"' results.json >> $GITHUB_STEP_SUMMARY
              
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "❌ Failing tests detected. Halting pipeline automation."
              exit 1
            else
              echo "### 🎉 All Tests Passed!" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ Could not locate results.json report file."
            exit 1
          fi

      - name: Merge to main
        if: success()
        uses: devops-infra/action-pull-request@v1.1.1
        with:
          github_token: ${{ secrets.GIT_TOKEN }}
          source_branch: testing
          target_branch: main
          title: 'Automated Merge from testing to main'
          body: 'This PR was automatically created by the Tests Automation workflow after successful tests.'
