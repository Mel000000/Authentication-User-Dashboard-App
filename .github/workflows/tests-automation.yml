# This workflow runs on every push to testing, runs the tests and if they pass, it merges the changes to main
name: Tests Automation

on:
  workflow_dispatch:
  push:
    branches: [ testing ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run tests
        run: npx playwright test
        env:
          CI: true
        
      - name: Merge to main
        if: success()
        uses: devops-infra/action-pull-request@v1.1.1
        with:
          github_token: ${{ secrets.GIT_TOKEN }}
          source_branch: testing
          target_branch: main
          new_string: 'Automated Merge from testing to main'
          old_string: 'This PR was automatically created by the Tests Automation workflow after successful tests.'
